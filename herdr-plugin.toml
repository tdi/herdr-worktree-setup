id = "dariusz.worktree-setup"
name = "Worktree Setup"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Run per-project setup steps when a worktree is created"
platforms = ["linux", "macos"]

[[build]]
command = ["npm", "ci"]

[[events]]
on = "worktree.created"
command = ["node", "src/setup.js"]
